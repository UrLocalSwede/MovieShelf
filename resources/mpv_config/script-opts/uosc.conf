# MovieShelf theme for uosc — crimson accent (#f43f5e) on dark.
# Color format is RRGGBB (no leading #).
foreground=f43f5e
foreground_text=ffffff
background=100e11
background_text=ede9ec
total_time=yes
time_precision=0
timeline_style=line
timeline_size=40
controls=menu,gap,subtitles,<has_many_audio>audio,<has_many_video>video,gap,space,speed,space,fullscreen
top_bar=no
