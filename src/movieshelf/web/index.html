<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MovieShelf</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 24 24" aria-hidden="true">
        <rect x="2" y="6" width="20" height="14" rx="3" />
        <path class="brand-strip" d="M2 9 L22 9 M6 6 L4 9 M11 6 L9 9 M16 6 L14 9 M21 6 L19 9" />
        <path class="brand-play" d="M10 11.5 L15 14 L10 16.5 Z" />
      </svg>
      <span class="brand-name">MovieShelf</span>
    </div>
    <div class="search">
      <svg viewBox="0 0 24 24" aria-hidden="true" class="search-icon">
        <circle cx="11" cy="11" r="7" /><path d="M21 21 L16 16" />
      </svg>
      <input id="search" type="search" placeholder="Search titles…" autocomplete="off" spellcheck="false" />
    </div>
    <div class="actions">
      <button id="refresh" class="btn">Refresh</button>
      <button id="add-folder" class="btn">Add folder</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="card">
        <div class="card-label">Current folder</div>
        <div id="current-folder" class="folder-path">—</div>
      </div>
      <div class="card stat">
        <div id="stat-count" class="stat-num">0</div>
        <div class="stat-text">titles ready · VLC preferred</div>
      </div>
      <div class="card libraries">
        <div class="card-label">Saved libraries</div>
        <ul id="library-list" class="library-list"></ul>
      </div>
    </aside>

    <main class="content">
      <div id="grid" class="grid"></div>
      <div id="empty" class="empty hidden">
        <div class="empty-title">No movies here yet</div>
        <div class="empty-text">Add a folder containing <code>.mkv</code> or <code>.mp4</code> files.</div>
      </div>
    </main>
  </div>

  <!-- Detail overlay -->
  <div id="scrim" class="scrim hidden"></div>
  <section id="detail" class="detail" aria-hidden="true">
    <div id="backdrop" class="backdrop"></div>
    <button id="detail-close" class="detail-close" title="Close (Esc)">×</button>

    <div class="detail-body">
      <div class="detail-head">
        <div class="poster-wrap">
          <img id="poster" class="poster hidden" alt="" />
          <div id="poster-fallback" class="poster-fallback">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="2" y="6" width="20" height="14" rx="3"/><path d="M10 11.5 L15 14 L10 16.5 Z"/></svg>
          </div>
        </div>

        <div class="detail-main">
          <h2 id="d-title" class="d-title">—</h2>
          <div id="d-tagline" class="d-tagline"></div>
          <div id="d-facts" class="d-facts"></div>
          <div id="d-ratings" class="ratings"></div>
          <div id="d-genres" class="chips"></div>
          <p id="d-overview" class="d-overview"></p>

          <div class="controls">
            <div class="control-row">
              <label class="field-label" for="subtitle">Subtitle</label>
              <select id="subtitle" class="select"><option value="">Auto</option></select>
            </div>
            <div class="buttons">
              <button id="play" class="btn-play">▶  Play</button>
              <button id="trailer" class="btn-ghost">Watch trailer</button>
              <button id="rematch" class="btn-ghost" title="Search again">Re-match</button>
            </div>
            <div id="play-status" class="play-status"></div>
          </div>
        </div>
      </div>

      <div id="collection" class="collection hidden">
        <div class="card-label" id="collection-name">Collection</div>
        <div id="collection-row" class="collection-row"></div>
      </div>
    </div>

    <div id="detail-loading" class="detail-loading">
      <div class="spinner"></div>
      <div id="loading-text" class="loading-text">Parsing filename…</div>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
